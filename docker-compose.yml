version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env
    environment:
      SUMMARIZER_URL: ${SUMMARIZER_URL:-http://summarizer:8030}
      NOTIFIER_URL: ${NOTIFIER_URL:-http://notifier:8040}
      INGESTION_URL: ${INGESTION_URL:-http://ingestion:8020}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
    ports:
      - "8000:8000"
    depends_on:
      - summarizer
      - notifier
      - ingestion

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:8000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
    ports:
      - "8010:8010"
    depends_on:
      - gateway

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    env_file:
      - .env
    environment:
      SUMMARIZER_URL: ${SUMMARIZER_URL:-http://summarizer:8030}
      NOTIFIER_URL: ${NOTIFIER_URL:-http://notifier:8040}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
    ports:
      - "8020:8020"

  summarizer:
    build:
      context: .
      dockerfile: services/summarizer/Dockerfile
    env_file:
      - .env
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
    ports:
      - "8030:8030"

  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    env_file:
      - .env
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
    ports:
      - "8040:8040"

